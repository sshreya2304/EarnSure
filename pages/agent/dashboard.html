<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Dashboard | EarnSure</title>
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>EarnSure</h3>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="active">📊 Dashboard</a>
                <a href="claims.html">📁 My Claims</a>
                <a href="payouts.html">💰 Payouts</a>
                <a href="../../index.html" class="logout">🚪 Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h2>Welcome Back, Agent</h2>
                <div class="user-profile">
                    <span>ID: ES-7829</span>
                </div>
            </header>

            <section class="stats-grid">
                <div class="stat-card">
                    <h4>Insured Income</h4>
                    <p class="stat-value">$2,450</p>
                    <span class="stat-label">This Month</span>
                </div>
                <div class="stat-card">
                    <h4>Active Policies</h4>
                    <p class="stat-value">3</p>
                    <span class="stat-label">Verified</span>
                </div>
                <div class="stat-card">
                    <h4>Pending Claims</h4>
                    <p class="stat-value">1</p>
                    <span class="stat-label text-warning">Processing</span>
                </div>
            </section>

            <section class="chart-container">
                <h3>Income Protection Overview</h3>
                <canvas id="incomeChart"></canvas>
            </section>
        </main>
    </div>

    <script type="module" src="../../js/pages/agent/dashboard.js"></script>
</body>
</html>
