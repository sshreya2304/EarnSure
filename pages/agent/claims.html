<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Claims | EarnSure</title>
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/layout.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="../../assets/logo.jpg" onerror="this.onerror=null; this.src='../../assets/logo.png';" alt="Logo" style="width: 65px; border-radius: 8px;">
                <h3>EarnSure</h3>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html">📊 My Earnings</a>
                <a href="#" class="active">📩 File a Claim</a>
                <a href="payouts.html">💰 Payouts</a>
                <a href="policy.html">🛡️ My Policy</a>
                <a href="../../index.html" class="logout">🚪 Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h2>Claims Management</h2>
            </header>

            <div class="stats-grid" style="grid-template-columns: 1fr 2fr;">
                <!-- File Claim Form -->
                <div class="card">
                    <h3>File a New Claim</h3>
                    <form id="claimForm" style="display: flex; flex-direction: column; gap: 15px; margin-top: 15px;">
                        <div>
                            <label style="font-weight: bold; font-size: 0.9rem;">Claim Amount ($)</label>
                            <input type="number" id="claimAmount" required style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; margin-top: 5px; box-sizing: border-box;">
                        </div>
                        <div>
                            <label style="font-weight: bold; font-size: 0.9rem;">Platform</label>
                            <select id="claimPlatform" required style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; margin-top: 5px; box-sizing: border-box;">
                                <option value="uber">Uber / Lyft</option>
                                <option value="delivery">Zomato / Swiggy / DoorDash</option>
                            </select>
                        </div>
                        <div>
                            <label style="font-weight: bold; font-size: 0.9rem;">Description</label>
                            <textarea id="claimDesc" rows="3" required style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; margin-top: 5px; box-sizing: border-box;" placeholder="Briefly describe the incident..."></textarea>
                        </div>
                        <button type="submit" class="btn-primary">Submit Claim</button>
                    </form>
                </div>

                <!-- Claims History Table -->
                <div class="card">
                    <h3>My Claims History</h3>
                    <div class="table-container">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>Claim ID</th>
                                    <th>Date</th>
                                    <th>Amount</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="claimsTableBody">
                                <!-- Injected dynamically by claims.js -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="./claims.js"></script>
</body>
</html>
