<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Risk Heatmap | SuperAdmin</title>
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/layout.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <main class="main-content">
            <h2>Regional Risk Heatmap</h2>
            <p>Sectors highlighted in red indicate high income-loss volatility.</p>
            
            <div class="card" style="margin-top:20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: #eee; padding: 20px; border-radius: 15px;">
                <div style="height: 100px; background: #fca5a5; border-radius: 8px; display: flex; align-items: center; justify-content: center;">Sector A (High)</div>
                <div style="height: 100px; background: #86efac; border-radius: 8px; display: flex; align-items: center; justify-content: center;">Sector B (Low)</div>
                <div style="height: 100px; background: #fde047; border-radius: 8px; display: flex; align-items: center; justify-content: center;">Sector C (Mid)</div>
                <div style="height: 100px; background: #86efac; border-radius: 8px; display: flex; align-items: center; justify-content: center;">Sector D (Low)</div>
                <div style="height: 100px; background: #fca5a5; border-radius: 8px; display: flex; align-items: center; justify-content: center;">Sector E (High)</div>
                <div style="height: 100px; background: #86efac; border-radius: 8px; display: flex; align-items: center; justify-content: center;">Sector F (Low)</div>
            </div>
            <a href="platformAnalytics.html" style="display:inline-block; margin-top:20px; color: #2563eb;">← Back to Analytics</a>
        </main>
    </div>
</body>
</html>
