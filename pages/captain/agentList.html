<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Team | EarnSure Captain</title>
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/layout.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <main class="main-content">
            <h2>Team Directory (North Zone)</h2>
            <div class="stats-grid">
                <div class="stat-card"><h4>High Risk Agents</h4><p style="color:red; font-size:1.5rem; font-weight:bold;">2</p></div>
                <div class="stat-card"><h4>Average Earnings</h4><p>$520/wk</p></div>
            </div>

            <div class="table-container card">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Agent Name</th>
                            <th>Last Activity</th>
                            <th>Risk Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Rahul Sharma</td>
                            <td>2 hours ago</td>
                            <td><span style="color:green">● Low</span></td>
                            <td><button class="btn-small">Message</button></td>
                        </tr>
                        <tr>
                            <td>Priya Patel</td>
                            <td>1 day ago</td>
                            <td><span style="color:red">● High (Drop in Hours)</span></td>
                            <td><button class="btn-small" style="background:#f59e0b; color:white; border:none;">Review Performance</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</body>
</html>
