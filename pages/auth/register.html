<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | EarnSure</title>
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/auth.css">
</head>
<body>
    <div class="login-container">
        <div class="glass-card">
            <div class="auth-header" style="text-align: center; margin-bottom: 20px;">
                <img src="../../assets/logo.jpg" onerror="this.onerror=null; this.src='../../assets/logo.png';" alt="Logo" style="width: 120px; border-radius: 12px;">
                <h2 style="margin-top: 10px;">Join EarnSure</h2>
            </div>

            <div id="registrationForm">
                <div class="form-step" id="step1">
                    <p>Step 1: Personal Details</p>
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" id="regName" placeholder="Enter Full Name" required>
                    </div>
                    <div class="input-group">
                        <label>Phone Number</label>
                        <input type="tel" id="regPhone" placeholder="Enter Phone Number" required>
                    </div>
                    <button type="button" class="btn-login" id="toStep2">Next</button>
                </div>

                <div class="form-step" id="step2" style="display:none;">
                    <p>Step 2: Profile Setup</p>
                    <div class="input-group">
                        <label>Primary Platform</label>
                        <select id="regPlatform">
                            <option value="uber">Uber / Lyft</option>
                            <option value="delivery">Zomato / Swiggy / DoorDash</option>
                        </select>
                    </div>
                    <button type="button" class="btn-login" id="toStep3">Final Step</button>
                </div>

                <div class="form-step" id="step3" style="display:none;">
                    <p>Step 3: Secure Your Account</p>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="regPass" placeholder="••••••••">
                    </div>
                    <button type="button" class="btn-login" id="finishBtn">Complete Registration</button>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="./register.js"></script>
</body>
</html>
